<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — PrivateSpace</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #ffffff;
        color: #1a1614;
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #13110f; color: #f5f1ee; }
        .card { background: #1c1816; border-color: #2c2622; }
        .muted { color: #a89f98; }
      }
      .card {
        max-width: 22rem;
        width: 100%;
        padding: 2rem 1.75rem;
        border: 1px solid #ece7e3;
        border-radius: 1.25rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }
      .logo {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        margin: 0 auto 1rem;
        display: block;
      }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { margin: 0; font-size: 0.9rem; line-height: 1.5; }
      .muted { color: #6b635c; }
      button {
        margin-top: 1.5rem;
        width: 100%;
        padding: 0.7rem 1rem;
        border: 0;
        border-radius: 0.75rem;
        font-size: 0.9rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #ff8a3d, #f25c05);
        cursor: pointer;
      }
      button:active { transform: scale(0.98); }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/icon-192.png" alt="PrivateSpace" />
      <h1>You're offline</h1>
      <p class="muted">
        We couldn't reach the network. Check your connection and try again —
        your private space is waiting.
      </p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
